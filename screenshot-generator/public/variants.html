<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mirror Runners — Richtung B (final set)</title>
<style>
  :root{
    --fg:#F4F4FC; --purple:#B48CFF; --cyan:#50C8FF; --magenta:#D880FF;
    --orange:#FF8C50; --green:#00E0A4; --gold:#FFC23E; --muted:#9A9ABE;
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:Inter,-apple-system,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  body{background:#070710;color:var(--fg);padding:36px}
  h1{font-size:23px;font-weight:800;letter-spacing:-.01em}
  .lead{color:var(--muted);margin:6px 0 26px;max-width:820px;line-height:1.55}
  .tabs{margin-bottom:22px}
  .tabs button{background:#15151f;color:#cfd2e6;border:1px solid #26263a;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;margin-right:8px}
  .tabs button.on{background:var(--purple);color:#1a1030;border-color:var(--purple)}
  .strip{display:flex;gap:26px;flex-wrap:wrap}
  .cell h2{font-size:12px;font-weight:700;letter-spacing:.06em;color:var(--muted);margin-bottom:10px}

  .slide{position:relative;width:320px;height:695px;border-radius:22px;overflow:hidden;background:#06060c;
    box-shadow:0 18px 50px rgba(0,0,0,.5)}
  .ambient{position:absolute;inset:-12%;z-index:0;object-fit:cover;filter:blur(50px) saturate(1.35);opacity:.5;transform:scale(1.25)}
  .mirror{position:absolute;top:0;bottom:0;left:50%;width:2px;transform:translateX(-50%);z-index:3;pointer-events:none;opacity:.6;
    background:linear-gradient(180deg,transparent,color-mix(in srgb,var(--accent) 50%,transparent) 30%,color-mix(in srgb,var(--accent) 50%,transparent) 70%,transparent);
    box-shadow:0 0 16px color-mix(in srgb,var(--accent) 45%,transparent)}
  .cap{position:absolute;top:5.6%;left:8%;right:8%;z-index:5;text-align:center}
  .eyebrow{color:var(--accent);font-weight:800;letter-spacing:.2em;text-transform:uppercase;font-size:11px;margin-bottom:9px}
  .head{color:var(--fg);font-weight:800;letter-spacing:-.035em;line-height:1.02;font-size:33px;white-space:pre-line;text-shadow:0 3px 24px rgba(0,0,0,.7)}

  .device{position:absolute;left:50%;transform:translateX(-50%);aspect-ratio:1022/2082;z-index:4;top:21.5%;
    filter:drop-shadow(0 26px 40px rgba(0,0,0,.75)) drop-shadow(0 0 40px color-mix(in srgb,var(--accent) 36%,transparent))}
  .device .frame{position:absolute;inset:0;width:100%;height:100%;z-index:1}
  .device .screen{position:absolute;left:5.09%;top:2.21%;width:89.82%;height:95.58%;border-radius:13.7%/6.3%;overflow:hidden;background:#000;z-index:2}
  .device .screen img{width:100%;height:100%;object-fit:cover;object-position:top}
  /* blackout event: darken right half inside the screen */
  .device .blackout{position:absolute;top:0;right:0;width:50%;height:100%;z-index:3;
    background:linear-gradient(270deg,#000 70%,rgba(0,0,0,.6) 100%)}
  /* in-game event label banner (upper third of the screen) */
  .device .evbanner{position:absolute;top:13%;left:50%;transform:translateX(-50%);z-index:4;
    padding:3px 9px;border-radius:5px;background:rgba(10,10,18,.9);border:1.2px solid #8FA3B8;
    color:#8FA3B8;font-size:8px;font-weight:800;letter-spacing:2.5px;white-space:nowrap;
    box-shadow:0 0 12px rgba(143,163,184,.5)}

  .glass{position:absolute;z-index:6;background:rgba(14,14,24,.66);backdrop-filter:blur(16px);
    border:1px solid rgba(255,255,255,.14);border-radius:20px;box-shadow:0 14px 38px rgba(0,0,0,.6)}
  .feat{display:flex;align-items:center;gap:11px;padding:8px 4px}
  .feat .ic{width:32px;height:32px;border-radius:50%;flex:0 0 auto;display:grid;place-items:center;
    border:1.5px solid color-mix(in srgb,var(--c) 80%,transparent);background:#0A0A12;
    box-shadow:0 0 14px color-mix(in srgb,var(--c) 45%,transparent);color:var(--c)}
  .feat .ic svg{width:17px;height:17px}
  .feat .tx b{display:block;font-size:12.5px;font-weight:700;color:#fff}
  .feat .tx span{font-size:10px;color:var(--muted);line-height:1.25}
  .divline{height:1px;background:rgba(255,255,255,.08)}

  .panelttl{font-size:10.5px;font-weight:800;letter-spacing:.14em;color:#fff;text-align:center;margin-bottom:11px}
  /* worlds journey gradient */
  .v1bar{height:17px;border-radius:9px;border:1px solid rgba(255,255,255,.22);box-shadow:0 0 18px rgba(255,255,255,.1),inset 0 1px 2px rgba(255,255,255,.2)}
  .v1lab{display:flex;justify-content:space-between;align-items:center;margin-top:9px;font-size:9px;font-weight:800;letter-spacing:.08em;color:#fff}
  .v1lab span{color:var(--muted);font-weight:600;letter-spacing:.12em}
  /* worlds teaser tiles */
  .wtiles{display:flex;flex-wrap:wrap;justify-content:center;gap:10px 8px}
  .wtile{display:flex;flex-direction:column;align-items:center;gap:5px;width:34px}
  .wtile .sw{width:34px;height:44px;border-radius:9px;display:block;border:1px solid rgba(255,255,255,.12)}
  .wtile em{font-style:normal;font-size:7.5px;font-weight:700;letter-spacing:.02em;color:#d3d6e8;text-align:center;line-height:1.05}
  /* event 2x2 grid */
  .evgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px 12px}
  .ev{display:flex;align-items:center;gap:9px}
  .ev .ic{width:28px;height:28px;border-radius:50%;flex:0 0 auto;display:grid;place-items:center;
    border:1.5px solid color-mix(in srgb,var(--c) 80%,transparent);background:#0A0A12;color:var(--c);
    box-shadow:0 0 12px color-mix(in srgb,var(--c) 40%,transparent)}
  .ev .ic svg{width:15px;height:15px}
  .ev .tx b{display:block;font-size:11px;font-weight:700;color:#fff;line-height:1.15}
  .ev .tx span{display:block;font-size:8.5px;color:var(--muted);line-height:1.0;margin-top:1px}
  /* skin model avatars */
  .skins{display:flex;justify-content:center;gap:13px}
  .runner{position:relative;width:24px;height:34px;border-radius:9px 9px 7px 7px;
    box-shadow:0 0 12px var(--g),inset 0 -4px 8px rgba(0,0,0,.35)}
  .runner::before,.runner::after{content:"";position:absolute;top:8px;width:5px;height:6px;border-radius:50%;background:#0b0b12}
  .runner::before{left:5px}.runner::after{right:5px}

  .pills{display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
  .pill{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);border-radius:999px;
    padding:7px 12px;font-size:10.5px;font-weight:600;color:#e6e8f6}
  .pill b{color:var(--accent);font-weight:800}

  .trust{position:absolute;left:0;right:0;bottom:3.2%;z-index:6;text-align:center;color:#aeb0c8;font-size:10.5px;font-weight:600;letter-spacing:.05em}
  .trust .s{color:var(--gold)}
  /* outro */
  .outro{position:absolute;inset:0;z-index:5;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 30px}
  .wordmark{font-size:38px;font-weight:900;letter-spacing:.03em;line-height:1}
  .stars span{color:var(--gold);font-size:17px;margin:0 2px}
</style>
</head>
<body>
<h1>Mirror Runners — Richtung B · finale Serie (6 Slides)</h1>
<p class="lead">Premium-Device + farbangepasster Ambient-Glow + Glas-Panel mit echtem Inhalt. Optimiert: Creator zeigt die verschiedenen Runner-Modelle, Power-Ups zeigt den Gameplay-Screen. Umschalten DE/EN. Wenn das passt, baue ich es 1:1 in den Generator.</p>
<div class="tabs"><button id="ten" class="on" onclick="render('en')">EN</button><button id="tde" onclick="render('de')">DE</button></div>
<div class="strip" id="strip"></div>

<script>
const S=(loc,k)=>`/screenshots/${loc}/${k}`;
const dev=(loc,shot,w)=>`<div class="device" style="width:${w}%"><img class="frame" src="/mockup.png"><div class="screen"><img src="${S(loc,shot)}"></div></div>`;
const cap=(eb,hd)=>`<div class="cap"><div class="eyebrow">${eb}</div><div class="head">${hd}</div></div>`;
const slideBase=(accent,inner,extraBg='')=>`<div class="slide" style="--accent:${accent};background:radial-gradient(120% 70% at 50% 28%, color-mix(in srgb,${accent} 16%,#0a0a16), #07070f 62%)">${extraBg}${inner}</div>`;

// power-up icons
const ICON={
  shield:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3l7 3v5c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6z"/></svg>',
  sync:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 4v16M16 4v16M8 8l-3 3 3 3M16 16l3-3-3-3"/></svg>',
  slow:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="13" r="7"/><path d="M12 13V9M12 3h0"/></svg>',
  eye:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="2.5"/></svg>',
  phantom:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"/><path d="M4 4l16 16"/></svg>',
  swap:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 8h13l-3-3M20 16H7l3 3"/></svg>',
  desync:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3v14l-3-3M16 21V7l3 3"/></svg>',
  blackout:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 000 18z" fill="currentColor" stroke="none"/></svg>',
};

const T={
  en:{
    heroEb:'MIRROR RUNNERS', heroHd:'One move.\nTwo runners.', heroPanel:'ALL IN ONE GAME',
    worldsEb:'11 WORLDS', worldsHd:'Run further.\nSee more.',
    eventsEb:'MIRROR EVENTS', eventsHd:'Expect the\nunexpected.',
    creatorEb:'SKIN CREATOR', creatorHd:'Make it\nyours.', creatorPanel:'DESIGN YOUR OWN',
    achEb:'ACHIEVEMENTS', achHd:'Chase every\nmilestone.', achPanel:'23 ACHIEVEMENTS TO UNLOCK',
    puEb:'POWER-UPS', puHd:'Tip the odds\nyour way.',
    pu:[['shield','Shield','Absorbs a hit'],['sync','Sync-Lock','Un-mirrors'],['slow','Slow-Mo','Slows time'],['eye','Foresight','Reveals obstacles']],
    ev:[['phantom','Phantom','Obstacles vanish'],['swap','Swap','Controls flip'],['desync','Desync','Sides drift'],['blackout','Blackout','One side dark']],
    outroHd:'Get it free.', outroSub:'One move. Two runners. Endless mirror chaos.', trust:'Free · No subscription · No ads to start',
    heroPills:['<b>11</b> Worlds','<b>7</b> Skins','<b>Daily</b> Run'],
  },
  de:{
    heroEb:'MIRROR RUNNERS', heroHd:'Eine Bewegung.\nZwei Runner.', heroPanel:'ALLES IN EINEM SPIEL',
    worldsEb:'11 WELTEN', worldsHd:'Lauf weiter.\nEntdecke mehr.',
    eventsEb:'SPIEGEL-EVENTS', eventsHd:'Erwarte das\nUnerwartete.',
    creatorEb:'SKIN-CREATOR', creatorHd:'Mach ihn\neinzigartig.', creatorPanel:'DESIGN YOUR OWN',
    achEb:'ERFOLGE', achHd:'Jage jeden\nMeilenstein.', achPanel:'23 ERFOLGE ZUM FREISCHALTEN',
    puEb:'POWER-UPS', puHd:'Verschaff dir\neinen Vorteil.',
    pu:[['shield','Schild','Blockt 1 Treffer'],['sync','Sync-Lock','Entspiegelt'],['slow','Slow-Mo','Verlangsamt'],['eye','Voraussicht','Zeigt Verstecktes']],
    ev:[['phantom','Phantom','Werden unsichtbar'],['swap','Swap','Steuerung kippt'],['desync','Desync','Seiten driften'],['blackout','Blackout','Seite wird dunkel']],
    outroHd:'Jetzt gratis holen.', outroSub:'Eine Bewegung. Zwei Runner. Endloses Spiegel-Chaos.', trust:'Gratis · Kein Abo · Werbefrei zum Start',
    heroPills:['<b>11</b> Welten','<b>7</b> Skins','<b>Daily</b> Run'],
  }
};

// 6 skin model colors (body color, glow)
const SKINCOLORS=[['#FF6B35','#FF6B35'],['#4FD0FF','#4FD0FF'],['#FF4D4D','#FF4D4D'],['#FFC23E','#FFC23E'],['#19B8C4','#19B8C4'],['#D266FF','#D266FF']];

function skinRow(){return `<div class="skins">`+SKINCOLORS.map(([c,g])=>`<div class="runner" style="background:linear-gradient(180deg,${c},color-mix(in srgb,${c} 65%,#000));--g:${g}"></div>`).join('')+`</div>`;}
function pills(arr){return `<div class="pills">`+arr.map(p=>`<span class="pill">${p}</span>`).join('')+`</div>`;}
function featList(items){return items.map((it,i)=>`<div class="feat" style="--c:var(--${{shield:'cyan',sync:'purple',slow:'gold',eye:'green'}[it[0]]})"><div class="ic">${ICON[it[0]]}</div><div class="tx"><b>${it[1]}</b><span>${it[2]}</span></div></div>${i<items.length-1?'<div class="divline"></div>':''}`).join('');}
const EVC={phantom:'cyan',swap:'orange',desync:'purple',blackout:'muted',shield:'cyan',sync:'purple',slow:'gold',eye:'green'};
function evGrid(items){return `<div class="evgrid">`+items.map(it=>`<div class="ev" style="--c:var(--${EVC[it[0]]})"><div class="ic">${ICON[it[0]]}</div><div class="tx"><b>${it[1]}</b><span>${it[2]}</span></div></div>`).join('')+`</div>`;}
const BIOMES=[['FOREST','#37E06B'],['CITY','#A9B6D6'],['CRYSTAL','#3FE4FF'],['VOLCANO','#FF5A1E'],['DESERT','#FFC72E'],['OCEAN','#12D6E6'],['RUINS','#A6F060'],['SPACE','#5E6CFF'],['STORM','#B86AFF'],['NEON','#F24DFF'],['VOID','#B9C0D0']];
function worldGradient(){
  const grad='linear-gradient(90deg,'+BIOMES.map((b,i)=>`${b[1]} ${Math.round(i/(BIOMES.length-1)*100)}%`).join(',')+')';
  return `<div class="panelttl">A JOURNEY THROUGH 11 WORLDS</div>
    <div class="v1bar" style="background:${grad}"></div>
    <div class="v1lab"><b>FOREST</b><span>11 WORLDS</span><b>VOID</b></div>`;
}

function render(loc){
  document.getElementById('ten').className = loc==='en'?'on':'';
  document.getElementById('tde').className = loc==='de'?'on':'';
  const t=T[loc];
  const slides=[
    {name:'1 · Hero (Menü)', html:slideBase('var(--purple)',
      `<img class="ambient" src="${S(loc,'01_menu.png')}"><div class="mirror"></div>`+cap(t.heroEb,t.heroHd)+dev(loc,'01_menu.png',66)
      +`<div class="glass" style="left:7%;right:7%;bottom:9%;padding:14px 16px"><div class="panelttl">${t.heroPanel}</div>`+pills(t.heroPills)+`</div>`)},
    {name:'2 · Worlds (Neon + Teaser)', html:slideBase('var(--magenta)',
      `<img class="ambient" src="${S(loc,'02_worlds.png')}" style="opacity:.7"><div class="mirror"></div>`+cap(t.worldsEb,t.worldsHd)+dev(loc,'02_worlds.png',66)
      +`<div class="glass" style="left:7%;right:7%;bottom:9%;padding:14px 16px">`+worldGradient()+`</div>`)},
    {name:'3 · Mirror Events', html:slideBase('var(--cyan)',
      `<img class="ambient" src="${S(loc,'02_gameplay.png')}" style="opacity:.5"><div class="mirror"></div>`+cap(t.eventsEb,t.eventsHd)
      +`<div class="device" style="width:66%"><img class="frame" src="/mockup.png"><div class="screen"><img src="${S(loc,'02_gameplay.png')}"><div class="blackout"></div><div class="evbanner">BLACKOUT</div></div></div>`
      +`<div class="glass" style="left:7%;right:7%;bottom:9%;padding:13px 15px">`+evGrid(t.ev)+`</div>`)},
    {name:'4 · Achievements (23)', html:slideBase('var(--cyan)',
      `<img class="ambient" src="${S(loc,'07_achievements.png')}" style="opacity:.45"><div class="mirror"></div>`+cap(t.achEb,t.achHd)+dev(loc,'07_achievements.png',66)
      +`<div class="glass" style="left:7%;right:7%;bottom:9%;padding:14px 16px"><div class="panelttl">${t.achPanel}</div></div>`)},
    {name:'5 · Builder + 3 Skins', html:slideBase('var(--green)',
      `<img class="ambient" src="${S(loc,'06_creator.png')}"><div class="mirror"></div>`+cap(t.creatorEb,t.creatorHd)+dev(loc,'06_creator.png',66)
      +`<div class="glass" style="left:7%;right:7%;bottom:9%;padding:11px 12px 9px"><div class="panelttl">${t.creatorPanel}</div><img src="/skinband.png" style="width:100%;border-radius:10px;display:block"></div>`)},
    {name:'6 · Power-Ups (aktiv im Lauf)', html:slideBase('var(--magenta)',
      `<img class="ambient" src="${S(loc,'02_powerups.png')}" style="opacity:.55"><div class="mirror"></div>`+cap(t.puEb,t.puHd)+dev(loc,'02_powerups.png',66)
      +`<div class="glass" style="left:7%;right:7%;bottom:9%;padding:13px 15px">`+evGrid(t.pu)+`</div>`)},
    {name:'7 · Outro', html:slideBase('var(--purple)',
      `<img class="ambient" src="${S(loc,'01_menu.png')}" style="opacity:.4"><div class="mirror"></div>
       <div class="outro"><img src="/app-icon.png" style="width:74px;height:74px;border-radius:18px;box-shadow:0 0 34px color-mix(in srgb,var(--purple) 55%,transparent);margin-bottom:20px">
       <div class="wordmark">MIRROR</div><div class="wordmark" style="color:var(--purple);margin-bottom:16px">RUNNERS</div>
       <div style="font-size:17px;font-weight:800;color:#fff">${t.outroHd}</div>
       <div style="font-size:12px;color:var(--muted);margin-top:10px;line-height:1.5;max-width:80%">${t.outroSub}</div>
       <div class="stars" style="margin-top:14px"><span>★</span><span>★</span><span>★</span><span>★</span><span>★</span></div></div>`)},
  ];
  document.getElementById('strip').innerHTML = slides.map(s=>`<div class="cell"><h2>${s.name}</h2>${s.html}</div>`).join('');
}
render('en');
</script>
</body>
</html>
