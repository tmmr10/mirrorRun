name: mirror_run
description: Mirror Runners - Cognitive Endless Runner
publish_to: 'none'
version: 1.4.1+30

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  flame: ^1.18.0
  flame_audio: ^2.1.0
  shared_preferences: ^2.2.3
  flutter_animate: ^4.5.0
  google_mobile_ads: ^5.3.0
  in_app_purchase: ^3.2.0
  games_services: ^5.0.0
  share_plus: ^10.0.0
  firebase_core: ^3.12.0
  firebase_analytics: ^11.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/audio/
    - assets/images/achievements/

flutter_launcher_icons:
  image_path: "assets/icon/app_icon.png"
  android: true
  ios: true
  remove_alpha_ios: false
  background_color_ios: "#08080e"
  adaptive_icon_background: "assets/icon/app_icon_full_1024.png"
  adaptive_icon_foreground: "assets/icon/transparent.png"
  macos:
    generate: true
    image_path: "assets/icon/app_icon.png"
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#08080e"
    theme_color: "#08080e"
